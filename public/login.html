<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>cd\ai | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/login.css?v=004" />
  </head>

  <body>
    <div class="login-shell">

      <!-- Logo -->
      <img src="/assets/logo-app.png" class="login-logo" alt="cd\ai logo" />

      <!-- Tagline immediately under logo -->
      <div class="login-tagline tagline-overlap">
        <em>Where governed intelligence meets decision velocity.</em>
      </div>

      <!-- Login card -->
      <div class="login-card">

        <!-- Title (single line, centered) -->
        <div class="login-title">cd\ai | Governed Dual-Hemisphere MVP</div>

        <!-- Subtitle -->
        <div class="login-subtitle">
          Private prototype. Access is limited to authorized reviewers.
        </div>

        <!-- Password row -->
        <div class="password-row">
          <input 
            id="password-input" 
            class="password-input" 
            type="password" 
            placeholder="Enter access password…" 
            autocomplete="off"
          />

          <!-- Blue login button with white > -->
          <button id="login-button" class="login-button" title="Login">
            >
          </button>
        </div>

        <!-- Error -->
        <div id="login-error" class="login-error"></div>

      </div> <!-- end login-card -->

      <!-- Footer -->
      <div class="login-footer">
        Copyright 2025 | Change Directories, LLC – Patent Pending Confidential MVP Demo
      </div>

    </div>

    <script>
      // Login handler
      const loginBtn = document.getElementById("login-button");
      const pwdInput = document.getElementById("password-input");
      const errorBox = document.getElementById("login-error");

      loginBtn.addEventListener("click", submitLogin);
      pwdInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") submitLogin();
      });

      function submitLogin() {
        const password = pwdInput.value.trim();
        errorBox.textContent = "";

        fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password })
        })
          .then(r => r.json())
          .then(data => {
            if (data.ok) {
              window.location.href = "/";
            } else {
              errorBox.textContent = "Incorrect password.";
            }
          })
          .catch(() => {
            errorBox.textContent = "Server error. Try again.";
          });
      }
    </script>
  </body>
</html>
