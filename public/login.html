<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>cd\ai – Governed Demo Login</title>
    <link rel="stylesheet" href="/static/styles-login.css" />
    <meta http-equiv="Cache-Control" content="no-store" />
  </head>

  <body>
    <div class="login-root">
      <div class="login-page">
        <div class="login-card">
          <img
            src="/assets/logo-login.png"
            alt="cd\ai"
            class="login-logo"
          />

          <h1 class="login-title">cd\ai Governed Demo</h1>
          <p class="login-subtitle">
            Private prototype. Access is limited to authorized reviewers.
          </p>

          <div class="field-label">Access Password</div>

          <input
            id="password"
            type="password"
            class="password-input"
            placeholder="Enter password"
            autocomplete="off"
          />

          <button id="login-button" class="login-button">
            Enter
          </button>

          <p id="login-error" class="login-error"></p>
        </div>
      </div>

      <footer class="app-footer">
        <img
          src="/assets/logo-login.png"
          alt="cd\ai"
          class="footer-logo"
        />
        <div class="footer-text">
          Copyright 2025 | Change Directories, LLC – Patent Pending Confidential MVP Demo
        </div>
      </footer>
    </div>

    <script>
      async function doLogin() {
        const passwordEl = document.getElementById("password");
        const errorEl = document.getElementById("login-error");
        const password = passwordEl.value.trim();

        errorEl.textContent = "";

        if (!password) {
          errorEl.textContent = "Please enter the access password.";
          return;
        }

        try {
          const res = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password }),
          });

          if (res.ok) {
            window.location.href = "/";
          } else {
            errorEl.textContent = "Incorrect password. Please try again.";
          }
        } catch (err) {
          console.error("Login error:", err);
          errorEl.textContent = "Network error. Please try again.";
        }
      }

      document
        .getElementById("login-button")
        .addEventListener("click", doLogin);

      document
        .getElementById("password")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            doLogin();
          }
        });
    </script>
  </body>
</html>
