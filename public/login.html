<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>cd\ai | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/login.css?v=004" />
  </head>

  <body>
    <div class="login-shell">
      <!-- Logo -->
      <img src="/assets/logo-app.png" class="login-logo" alt="cd\ai logo" />

      <!-- Tagline immediately under logo -->
      <div class="login-tagline tagline-overlap">
        <em>Where governed intelligence meets decision velocity.</em>
      </div>

      <!-- Login card -->
      <form class="login-card" method="POST" action="/auth">
        <!-- Title (single line, centered) -->
        <div class="login-title">cd\ai | Governed Dual-Hemisphere MVP</div>

        <!-- Subtitle -->
        <div class="login-subtitle">
          Private prototype. Access is limited to authorized reviewers.
        </div>

        <!-- Password row -->
        <div class="password-row">
          <input
            id="password-input"
            class="password-input"
            type="password"
            name="password"
            placeholder="Enter access password..."
            autocomplete="current-password"
            required
          />

          <!-- Blue login button with white > -->
          <button class="login-button" title="Login" type="submit">
            >
          </button>
        </div>

        <!-- Error -->
        <div id="login-error" class="login-error"></div>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        Copyright 2025 | Change Directories, LLC — Patent Pending Confidential
        MVP Demo
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get("error") === "1") {
        document.getElementById("login-error").textContent =
          "Incorrect password";
      }
    </script>
  </body>
</html>
