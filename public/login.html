<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>cd\ai – Login</title>
    <link rel="stylesheet" href="/styles-login.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
    <div class="login-container">

        <!-- HEADER -->
        <header class="login-header">
            <img src="/assets/logo-login.png" class="header-logo" alt="cdai logo" />
            <div class="header-title">cd\ai – Governed Artificial Intelligence</div>
        </header>

        <!-- LOGIN CARD -->
        <div class="login-card">

            <img src="/assets/logo-login.png" class="login-card-logo" alt="cdai logo" />

            <h1 class="login-title">Sign in to continue</h1>

            <form action="/auth/login" method="POST" class="login-form">

                <label class="login-label">Username</label>
                <input 
                    type="text" 
                    name="username" 
                    class="login-input"
                    required
                />

                <label class="login-label">Password</label>
                <input 
                    type="password" 
                    name="password" 
                    class="login-input"
                    required
                />

                <button type="submit" class="login-button">
                    Sign In
                </button>
            </form>
        </div>

        <!-- FOOTER -->
        <footer class="login-footer">
            <img src="/assets/logo-login.png" class="footer-logo" />
            <div class="footer-text">Copyright 2025 | Change Directories, LLC</div>
            <div class="footer-text">Patent Pending · Confidential MVP Demo</div>
        </footer>

    </div>
</body>
</html>
